name: Deploy to Self-Hosted Runner

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          /opt/ams/venv/bin/pip install -r backend/requirements-prod.txt --quiet

      - name: Install frontend dependencies
        run: |
          npm --prefix frontend ci --registry=https://registry.npmmirror.com

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Sync files to deployment directory
        run: |
          sudo rsync -av --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            backend/ /opt/ams/backend/

          sudo rsync -av --delete \
            frontend/dist/ /opt/ams/frontend/dist/

      - name: Restart backend
        run: |
          sudo systemctl daemon-reload
          sudo systemctl enable ams-backend
          sudo systemctl restart ams-backend || echo "Service not configured yet"

      - name: Reload nginx
        run: |
          sudo nginx -t && sudo systemctl reload nginx || echo "Nginx not configured yet"

      - name: Verify
        run: |
          sleep 2
          curl -s http://localhost:8000/api/health && echo " ✅ 部署成功" || echo " ❌ 部署可能有问题，检查日志: sudo journalctl -u ams-backend -n 30"
